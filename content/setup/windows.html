<h1>Windows向け Linux環境構築ガイド</h1>

    <h2>概要</h2>
    <p>WindowsでLinux環境を構築するための方法を説明します。すでにLinux環境が整っている場合は、このガイドをスキップしても問題ありません。</p>

    <h2>インストール手順</h2>
    <p><a href="https://learn.microsoft.com/ja-jp/windows/wsl/install">WSL のインストール</a>に従って、Linux環境をセットアップしてください。LinuxディストリビューションとしてUbuntuを選択してください。</p>
