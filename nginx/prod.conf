events {
    worker_connections 1024;
}

http {

    limit_req_zone $binary_remote_addr zone=req:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    server {
        listen 80;
        server_name cri.terada.click;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name cri.terada.click;

        ssl_certificate /etc/letsencrypt/live/cri.terada.click/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cri.terada.click/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        limit_conn conn 5;

        location = /docs { return 404; }
        location = /docs/ { return 404; }
        location = /redoc { return 404; }
        location = /openapi.json { return 404; }

        location / {
            limit_req zone=req burst=5;
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
