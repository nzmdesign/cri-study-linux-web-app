<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRI勉強会 - Linux入門</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='/favicon.png') }}">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4">
        <h1 class="text-4xl font-bold text-slate-800 mb-6">CRI勉強会 Linux入門</h1>
      </div>
    </header>

    <main class="flex-grow px-4 py-12">
      <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-100">
          <h2 class="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-red-500 pb-3">ユーザー削除</h2>

          <div class="bg-slate-50 rounded-lg p-6 mb-8 border border-slate-200">
            <h3 class="text-lg font-semibold text-slate-700 mb-4">対象ユーザー</h3>
            <div class="space-y-2">
              <p class="text-slate-700"><span class="font-semibold">メールアドレス:</span> {{ target_user.email }}</p>
              <p class="text-slate-700"><span class="font-semibold">氏名:</span> {{ target_user.last_name }} {{ target_user.first_name }}</p>
              <p class="text-slate-700"><span class="font-semibold">所属:</span> {{ target_user.organization_rel.name }}</p>
              <p class="text-slate-700"><span class="font-semibold">現在のロール:</span> {{ target_user.role.name }}</p>
            </div>
          </div>

          <div id="message-container"></div>

          <div class="bg-yellow-50 border-l-4 border-yellow-500 p-4 mb-6">
            <p class="text-yellow-800 font-semibold">⚠️ 本当にこのユーザーを削除してもよろしいですか？</p>
          </div>

          <form hx-post="/admin/users/{{ target_user.id }}/userdel" hx-target="#message-container" hx-swap="innerHTML" class="space-y-5">
            <div class="flex gap-4 pt-4">
              <button type="submit" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-lg transition-all shadow-md hover:shadow-lg">
                削除
              </button>
              <a href="/admin/users" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-3 px-4 rounded-lg transition-colors text-center">
                キャンセル
              </a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="bg-white border-t border-slate-200 text-center py-6 mt-auto">
      <p class="text-slate-600">&copy; CRI勉強会</p>
    </footer>

  </div>
</body>
</html>
