<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ユーザー登録 - CRI勉強会</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
  <style>
    .register-form {
      border: 2px solid #000;
      padding: 30px;
      margin: 0 auto 20px auto;
      max-width: 500px;
      text-align: center;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      margin-bottom: 8px;
      font-weight: bold;
    }
    .form-group input, .form-group select {
      padding: 12px;
      border: 2px solid #000;
      font-size: 1rem;
    }
    .message {
      padding: 15px;
      margin-bottom: 20px;
      border: 2px solid #000;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .success { background-color: #e8f5e8; color: #2d5a2d; }
    .error { background-color: #ffe8e8; color: #7a2d2d; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CRI勉強会 - Linux入門</h1>
    </header>

    <main>
      {% if register_error %}
      <div class="message error">
        <strong>エラー:</strong> {{ register_error }}
      </div>
      {% endif %}
      
      {% if register_success %}
      <div class="message success">
        <strong>成功:</strong> {{ register_success }}
      </div>
      {% endif %}
      
      <div class="register-form">
        <h2>ユーザー登録</h2>
        <form method="POST" action="/admin/register">
          <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" required placeholder="user@cri-me.com">
          </div>

          <div class="form-group">
            <label for="last_name">姓</label>
            <input type="text" id="last_name" name="last_name" required placeholder="山田">
          </div>

          <div class="form-group">
            <label for="first_name">名</label>
            <input type="text" id="first_name" name="first_name" required placeholder="太郎">
          </div>

          <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" required placeholder="パスワードを入力">
          </div>

          <div class="form-group">
            <label for="confirm_password">パスワード（再入力）</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="パスワードを再度入力">
          </div>

          <div class="form-group">
            <label for="is_admin">ユーザー種別</label>
            <select id="is_admin" name="is_admin">
              <option value="false">受講者</option>
              <option value="true">管理者</option>
            </select>
          </div>

          <div class="form-group">
            <label for="organization">所属</label>
            <select id="organization" name="organization" required>
              <option value="">所属を選択してください</option>
              {% for org in organizations %}
              <option value="{{ org.name }}">{{ org.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">ユーザーを登録</button>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <div class="footer-actions">
          <a href="/admin" class="btn btn-secondary">管理者ダッシュボードに戻る</a>
      </div>
      <p>&copy; 2025 CRI勉強会</p>
    </footer>
  </div>
</body>
</html>
