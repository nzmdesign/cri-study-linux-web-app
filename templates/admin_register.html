<!DOCTYPE html>
<html lang="ja">
{% include 'components/html_head.html' %}
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <div class="sticky top-0 z-50">
      {% include 'components/header.html' %}
      {% include 'components/nav_admin.html' %}
    </div>

    <main class="flex-grow px-4 py-12">
      <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-100">
          <h2 class="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-blue-500 pb-3">ユーザー登録</h2>

          <form action="/admin/register/confirm" method="POST" class="space-y-5">
            <div>
              <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">メールアドレス</label>
              <input type="email" id="email" name="email" required placeholder="user@cri-me.com"
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>

            <div>
              <label for="last_name" class="block text-sm font-semibold text-slate-700 mb-2">姓</label>
              <input type="text" id="last_name" name="last_name" required placeholder="山田"
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>

            <div>
              <label for="first_name" class="block text-sm font-semibold text-slate-700 mb-2">名</label>
              <input type="text" id="first_name" name="first_name" required placeholder="太郎"
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>

            <div>
              <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">パスワード</label>
              <input type="password" id="password" name="password" required placeholder="パスワードを入力"
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>

            <div>
              <label for="confirm_password" class="block text-sm font-semibold text-slate-700 mb-2">パスワード（再入力）</label>
              <input type="password" id="confirm_password" name="confirm_password" required placeholder="パスワードを再度入力"
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>

            <div>
              <label for="organization" class="block text-sm font-semibold text-slate-700 mb-2">所属</label>
              <select id="organization" name="organization" required
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
                <option value="">所属を選択してください</option>
                {% for org in organizations %}
                <option value="{{ org.name }}">{{ org.name }}</option>
                {% endfor %}
              </select>
            </div>

            <div>
              <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition-all shadow-md hover:shadow-lg">
                登録確認
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    {% include 'components/footer.html' %}

  </div>
</body>
</html>
