<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRI勉強会 - Linux入門</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='/favicon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>{{ exam_title }}</h1>
      <h2>試験結果</h2>
    </header>

    <main>
      <section class="result-section">
        <div class="result-summary">
          <div class="result-status {{ 'pass' if is_passed else 'fail' }}">
            <h2>{{ '合格' if is_passed else '不合格' }}</h2>
          </div>
          
          <div class="score-display">
            <p class="score-text">正解数: {{ correct_count }} / {{ total_questions }}</p>
          </div>
        </div>

      </section>
    </main>

    <footer>
      <div class="footer-actions">
        <a href="/" class="btn">トップに戻る</a>
      </div>
      <p>&copy; CRI勉強会</p>
    </footer>
  </div>
</body>
</html>
