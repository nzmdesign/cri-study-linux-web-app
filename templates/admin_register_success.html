<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRI勉強会 - Linux入門</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='/favicon.png') }}">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4">
        <h1 class="text-4xl font-bold text-slate-800 mb-6">CRI勉強会 Linux入門</h1>
        <nav class="border-t border-slate-200 pt-4">
          <div class="flex justify-center items-center">
            <ul class="flex gap-6">
              <li><a href="/admin/users" class="text-slate-700 hover:text-cyan-600 font-medium transition-colors">ユーザー一覧</a></li>
              <li><a href="/admin/register" class="text-slate-700 hover:text-cyan-600 font-medium transition-colors">ユーザー登録</a></li>
              <li><a href="/admin/history" class="text-slate-700 hover:text-cyan-600 font-medium transition-colors">受験履歴</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main class="flex-grow px-4 py-12">
      <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-100">
          <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 rounded-full mb-4">
              <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-4">ユーザーを登録しました</h2>
            <p class="text-slate-600 text-lg">ユーザーの登録が正常に完了しました。</p>
          </div>

          <div class="bg-slate-50 rounded-lg p-6 mb-8">
            <div class="space-y-3">
              <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                <span class="text-sm font-semibold text-slate-600">メールアドレス</span>
                <span class="text-slate-800">{{ user_email }}</span>
              </div>
              <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                <span class="text-sm font-semibold text-slate-600">氏名</span>
                <span class="text-slate-800">{{ user_last_name }} {{ user_first_name }}</span>
              </div>
              <div class="flex justify-between items-center">
                <span class="text-sm font-semibold text-slate-600">所属</span>
                <span class="text-slate-800">{{ user_organization }}</span>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-3">
            <a href="/admin/users" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition-all shadow-md hover:shadow-lg text-center">
              ユーザー一覧へ
            </a>
            <a href="/admin/register" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-3 px-4 rounded-lg transition-all text-center">
              続けて登録する
            </a>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-white border-t border-slate-200 text-center py-6 mt-auto">
      <a href="/" class="inline-block bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-2 px-6 rounded-lg transition-colors mb-4">トップに戻る</a>
      <p class="text-slate-600">&copy; CRI勉強会</p>
    </footer>

  </div>
</body>
</html>
