<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} - CRI勉強会</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
  <style>
    .content {
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.8;
    }
    .content h1 {
      border-bottom: 2px solid #000;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .content h2 {
      margin-top: 30px;
      margin-bottom: 15px;
      border-left: 4px solid #000;
      padding-left: 15px;
    }
    .content h3 {
      margin-top: 20px;
      margin-bottom: 10px;
    }
    .content p {
      margin-bottom: 15px;
    }
    .content ul, .content ol {
      margin-left: 20px;
      margin-bottom: 15px;
    }
    .content li {
      margin-bottom: 5px;
    }
    .content code {
      background-color: #f0f0f0;
      padding: 2px 5px;
      border: 1px solid #ddd;
      font-family: monospace;
    }
    .content pre {
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      padding: 15px;
      overflow-x: auto;
      margin-bottom: 15px;
    }
    .content blockquote {
      border-left: 4px solid #ccc;
      margin-left: 0;
      padding-left: 20px;
      color: #666;
    }
    .back-button {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CRI勉強会 - Linux入門</h1>
    </header>

    <main>
      <div class="content">
        {{ content | safe }}
      </div>
    </main>

    <footer>
      <div class="footer-actions">
        <a href="/" class="btn btn-secondary">トップに戻る</a>
      </div>
      <p>&copy; 2025 CRI勉強会</p>
    </footer>
  </div>
</body>
</html>
