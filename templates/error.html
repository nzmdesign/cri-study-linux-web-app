<!DOCTYPE html>
<html lang="ja">
{% include 'components/html_head.html' %}
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <div class="sticky top-0 z-50">
      {% include 'components/header.html' %}
      {% include 'components/nav_totop.html' %}
    </div>

    <main class="flex-grow px-4 py-12 flex items-center justify-center">
      <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-100">
          <div class="text-center">
            <div class="mb-6">
              <div class="inline-flex items-center justify-center w-20 h-20 bg-red-100 rounded-full mb-4">
                <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
              </div>
              <h2 class="text-3xl font-bold text-slate-800 mb-4">エラーが発生しました</h2>
              {% if message %}
              <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
                <p class="text-red-700 font-semibold">{{ message }}</p>
              </div>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </main>

    {% include 'components/footer.html' %}

  </div>
</body>
</html>
