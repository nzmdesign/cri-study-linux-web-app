<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRI勉強会 - Linux入門</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='/favicon.png') }}">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4">
        <h1 class="text-4xl font-bold text-slate-800 mb-6">CRI勉強会 Linux入門</h1>
      </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
        <div id="error-container"></div>
        
        <form hx-post="/login" hx-target="#error-container" hx-swap="innerHTML" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">メールアドレス</label>
            <input type="email" name="email" id="email" required placeholder="user@cri-me.com" 
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all">
          </div>
          <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">パスワード</label>
            <input type="password" name="password" id="password" required 
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all">
          </div>
          <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition-all shadow-md hover:shadow-lg">
            ログイン
          </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-slate-200 text-center">
          <p class="text-slate-600 mb-4">はじめての方はこちら</p>
          <a href="/guide" class="inline-block bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-2 px-6 rounded-lg transition-colors">
            受講案内
          </a>
        </div>
      </div>
    </main>

    <footer class="bg-white border-t border-slate-200 text-center py-6 mt-auto">
      <p class="text-slate-600">&copy; CRI勉強会</p>
    </footer>
  </div>
</body>
</html>
