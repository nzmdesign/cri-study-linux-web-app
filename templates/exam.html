<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRI勉強会 - Linux入門</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='/favicon.png') }}">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4">
        <h1 class="text-4xl font-bold text-slate-800 mb-6">CRI勉強会 Linux入門</h1>
        <nav class="border-t border-slate-200 pt-4">
          <div class="flex justify-end items-center">
            <ul class="flex gap-6">
              <li><a href="/" class="text-slate-700 hover:text-slate-900 font-medium transition-colors border-b-2 border-transparent hover:border-b-blue-500 pb-1">トップに戻る</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main class="flex-grow px-4 py-12">
      <div class="w-full max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-100">
          <h2 class="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-blue-500 pb-3">{{ exam.title }}</h2>
          
          <p class="text-slate-700 mb-6">以下の全ての問題に回答して「送信」を押すと採点されて結果が表示されます。</p>

            <form method="post" action="/exam/{{ exam_id }}/submit">
              {% for q in exam.questions %}
              <div class="bg-slate-50 rounded-lg p-6 mb-6 border border-slate-200">
                <div class="text-lg font-semibold text-blue-600 mb-3">問題 {{ loop.index }}</div>
                <div class="text-slate-800 font-medium mb-4">{{ q.question }}</div>
                <div class="space-y-3">
                  {% for opt in q.options %}
                  <div class="flex items-center">
                    <input type="radio" name="answer_{{ q.id }}" id="q-{{ q.id }}-opt-{{ loop.index0 }}" value="{{ loop.index0 }}" required
                      class="w-4 h-4 text-blue-600 focus:ring-blue-500 focus:ring-2">
                    <label for="q-{{ q.id }}-opt-{{ loop.index0 }}" class="ml-3 text-slate-700 cursor-pointer hover:text-slate-900">
                      <span class="font-semibold">{{ ['A','B','C','D'][loop.index0] }}.</span> {{ opt }}
                    </label>
                  </div>
                  {% endfor %}
                </div>
              </div>
              {% endfor %}

              <div class="mt-8 text-center">
                <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-lg transition-all shadow-md hover:shadow-lg">
                  送信
                </button>
              </div>
            </form>
        </div>
      </div>
    </main>

    {% include 'components/footer.html' %}

  </div>
</body>
</html>
