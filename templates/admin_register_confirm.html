<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRI勉強会 - Linux入門</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='/favicon.png') }}">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4">
        <h1 class="text-4xl font-bold text-slate-800 mb-6">CRI勉強会 Linux入門</h1>
        <nav class="border-t border-slate-200 pt-4">
          <div class="flex justify-center items-center">
            <ul class="flex gap-6">
              <li><a href="/admin/users" class="text-slate-700 hover:text-cyan-600 font-medium transition-colors">ユーザー一覧</a></li>
              <li><a href="/admin/register" class="text-slate-700 hover:text-cyan-600 font-medium transition-colors">ユーザー登録</a></li>
              <li><a href="/admin/history" class="text-slate-700 hover:text-cyan-600 font-medium transition-colors">受験履歴</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main class="flex-grow px-4 py-12">
      <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-100">
          <h2 class="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-blue-500 pb-3">ユーザー登録確認</h2>

          <div class="mb-8">
            <p class="text-slate-700 mb-6">以下の内容で登録します。よろしいですか？</p>
            
            <div class="bg-slate-50 rounded-lg p-6 space-y-4">
              <div class="border-b border-slate-200 pb-3">
                <span class="text-sm font-semibold text-slate-600 block mb-1">メールアドレス</span>
                <span class="text-lg text-slate-800">{{ email }}</span>
              </div>
              
              <div class="border-b border-slate-200 pb-3">
                <span class="text-sm font-semibold text-slate-600 block mb-1">姓</span>
                <span class="text-lg text-slate-800">{{ last_name }}</span>
              </div>
              
              <div class="border-b border-slate-200 pb-3">
                <span class="text-sm font-semibold text-slate-600 block mb-1">名</span>
                <span class="text-lg text-slate-800">{{ first_name }}</span>
              </div>
              
              <div class="border-b border-slate-200 pb-3">
                <span class="text-sm font-semibold text-slate-600 block mb-1">所属</span>
                <span class="text-lg text-slate-800">{{ organization }}</span>
              </div>
              
              <div>
                <span class="text-sm font-semibold text-slate-600 block mb-1">パスワード</span>
                <span class="text-lg text-slate-800">●●●●●●●●</span>
              </div>
            </div>
          </div>

          {% if error_message %}
          <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
            <p class="text-red-700 font-semibold">エラー: {{ error_message }}</p>
          </div>
          {% endif %}

          <div id="message-container"></div>

          <form hx-post="/admin/register/execute" hx-target="body" hx-swap="innerHTML" class="space-y-4">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="password" value="{{ password }}">
            <input type="hidden" name="confirm_password" value="{{ confirm_password }}">
            <input type="hidden" name="first_name" value="{{ first_name }}">
            <input type="hidden" name="last_name" value="{{ last_name }}">
            <input type="hidden" name="organization" value="{{ organization }}">
            
            <div class="flex gap-4">
              <a href="/admin/register" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-3 px-4 rounded-lg transition-all shadow-md hover:shadow-lg text-center">
                戻る
              </a>
              <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition-all shadow-md hover:shadow-lg">
                登録
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="bg-white border-t border-slate-200 text-center py-6 mt-auto">
      <a href="/" class="inline-block bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-2 px-6 rounded-lg transition-colors mb-4">トップに戻る</a>
      <p class="text-slate-600">&copy; CRI勉強会</p>
    </footer>

  </div>
</body>
</html>
