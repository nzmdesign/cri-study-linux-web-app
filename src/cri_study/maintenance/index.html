<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンテナンス中 - CRI勉強会</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4">
        <h1 class="text-4xl font-bold text-slate-800 mb-6">CRI勉強会 Linux入門</h1>
      </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-2xl">
        <div class="bg-white rounded-xl shadow-lg p-12 hover:shadow-2xl transition-all border border-slate-100 text-center space-y-6">
          <div class="text-6xl mb-4">🔧</div>
          
          <h2 class="text-3xl font-bold text-slate-800">メンテナンス中</h2>
          
          <div class="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-lg text-left">
            <p class="text-lg font-semibold text-blue-900 mb-2">メンテナンス時間</p>
            <p class="text-blue-800 text-lg">毎日 23:00 ～ 翌 9:00</p>
          </div>
          
          <div class="text-slate-600 space-y-3">
            <p class="text-lg">
              現在、システムメンテナンス中です。
            </p>
            <p>
              この時間帯は、サービスをご利用いただけません。
            </p>
          </div>
          
          <div class="pt-6 border-t border-slate-200">
            <p class="text-sm text-slate-500">
              メンテナンス終了後は、自動的にサービスが利用可能になります。<br>
            </p>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-white border-t border-slate-200 text-center py-6 mt-auto">
      <p class="text-slate-600">&copy; CRI勉強会</p>
    </footer>
  </div>
</body>
</html>
