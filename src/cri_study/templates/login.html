<!DOCTYPE html>
<html lang="ja">
{% include 'components/html_head.html' %}
<body class="bg-gradient-to-br from-blue-100 via-cyan-50 to-indigo-200 min-h-screen flex flex-col">
  <div class="flex flex-col min-h-screen">
    <div class="sticky top-0 z-50">
      <header class="bg-white border-b border-slate-300">
        <div class="max-w-6xl mx-auto px-6 py-2">
          <h1 class="text-lg sm:text-2xl md:text-3xl font-bold text-slate-800 mb-2">CRI勉強会 Linux入門</h1>
        </div>
      </header>
    </div>

    <main class="flex-grow flex items-center justify-center px-3 sm:px-4 py-6 sm:py-12">
      <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-4 sm:p-8">
        <div id="error-container"></div>
        
        <form hx-post="/login" hx-target="#error-container" hx-swap="innerHTML" class="space-y-4 sm:space-y-5">
          <div>
            <label for="email" class="block text-xs sm:text-sm font-semibold text-slate-700 mb-2">メールアドレス</label>
            <input type="email" name="email" id="email" required placeholder="user@cri-me.com" 
              class="w-full px-3 sm:px-4 py-2 sm:py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all text-sm sm:text-base">
          </div>
          <div>
            <label for="password" class="block text-xs sm:text-sm font-semibold text-slate-700 mb-2">パスワード</label>
            <input type="password" name="password" id="password" required 
              class="w-full px-3 sm:px-4 py-2 sm:py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all text-sm sm:text-base">
          </div>
          <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 sm:py-3 px-4 rounded-lg transition-all shadow-md hover:shadow-lg text-sm sm:text-base">
            ログイン
          </button>
        </form>
        
        <div class="mt-6 sm:mt-8 pt-4 sm:pt-6 border-t border-slate-200 text-center">
          <p class="text-xs sm:text-sm text-slate-600 mb-3 sm:mb-4">はじめての方はこちら</p>
          <a href="{{ github_repo_url }}/blob/main/docs/guide.md" target="_blank" rel="noopener noreferrer" class="inline-block bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-2 px-4 sm:px-6 rounded-lg transition-colors text-xs sm:text-sm">
            受講案内
          </a>
        </div>
      </div>
    </main>

    {% include 'components/footer.html' %}

  </div>
</body>
</html>
